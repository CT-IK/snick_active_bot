# ── Task Tracker · базовая конфигурация ─────────────────────────────────────
# Общая часть для локальной разработки и продакшена. Отдельно не запускается.
#
#   Локально:   docker compose up --build
#               (docker-compose.override.yml подхватывается автоматически)
#
#   Продакшен:  docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
# ────────────────────────────────────────────────────────────────────────────
services:
  web:
    build: .
    image: task-tracker:latest
    container_name: task-tracker-web
    volumes:
      # БД SQLite лежит на хосте — переживает пересборку контейнера
      - ./database:/app/database
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
